<mat-card>

  <mat-card-header>
    <mat-card-title>
      Títulos em atraso
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>

    <div class="loading-container" *ngIf="loading">
      <mat-spinner></mat-spinner>
    </div>

    <table
      mat-table
      [dataSource]="titulos"
      *ngIf="!loading">

      <!-- Número -->
      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Número</th>
        <td mat-cell *matCellDef="let t">
          {{ t.numeroTitulo }}
        </td>
      </ng-container>

      <!-- Devedor -->
      <ng-container matColumnDef="devedor">
        <th mat-header-cell *matHeaderCellDef>Devedor</th>
        <td mat-cell *matCellDef="let t">
          {{ t.nomeDevedor }}
        </td>
      </ng-container>

      <!-- Parcelas -->
      <ng-container matColumnDef="parcelas">
        <th mat-header-cell *matHeaderCellDef>Parcelas</th>
        <td mat-cell *matCellDef="let t">
          {{ t.quantidadeParcelas }}
        </td>
      </ng-container>

      <!-- Valor -->
      <ng-container matColumnDef="valorOriginal">
        <th mat-header-cell *matHeaderCellDef>Valor Original</th>
        <td mat-cell *matCellDef="let t">
          {{ t.valorOriginal | currency:'BRL' }}
        </td>
      </ng-container>

      <!-- Dias -->
      <ng-container matColumnDef="dias">
        <th mat-header-cell *matHeaderCellDef>Dias atraso</th>
        <td mat-cell *matCellDef="let t">
          {{ t.diasEmAtraso }}
        </td>
      </ng-container>

      <!-- Atualizado -->
      <ng-container matColumnDef="valorAtualizado">
        <th mat-header-cell *matHeaderCellDef>Valor Atualizado</th>
        <td mat-cell *matCellDef="let t">
          {{ t.valorAtualizado | currency:'BRL' }}
        </td>
      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns">
      </tr>

      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns;">
      </tr>

    </table>

  </mat-card-content>

</mat-card>
